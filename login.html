<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./imge/icon.png" type="image/x-icon">
  <link rel="stylesheet" href="css/all.min.css">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/login.css">
  <title>Hack The Point</title>
</head>

<body>
  <div class="login-container">
    <div class="login-box">
      <div class="text-center">
        <div class="logo">
          <img src="./imge/logo.png222.png" alt="logo" style="width: 227px;">
        </div>
        <p>To get started, you need to login here.</p>
      </div>
      <form action="home.html" class="form">
        <span class="input-span">
          <label for="email" class="label">Email</label>
          <input type="email" name="email" id="email" required
        /></span>
        <span class="input-span">
          <label for="password" class="label">Password</label>
          <input type="password" name="password" id="password" required
        /></span>
        <span class="span"><a href="#">Forgot password?</a></span>
        <input class="submit" type="submit" value="Log in" />
        <span class="span"
          >Don't have an account? <a href="#">Sign up</a></span
        >
      </form>
    </div>
  </div>

  
  <!-- Font Awesome (for icons) -->
  <script src="https://kit.fontawesome.com/a076d05399.js"></script>

  <script src="JS/all.min.js"></script>
  <script src="JS/bootstrap.bundle.min.js"></script>
</body>

</html>
